services:

  db:
    image: postgres:15-alpine
    container_name: sin_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sin_internal
      - sin_scan  

  redis:
    image: redis:7-alpine
    container_name: sin_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - sin_internal

  api:
    build: .
    container_name: sin_api
    command: >
      sh -c "python -c 'from sin.storage.init_db import init_db; init_db()' &&
             uvicorn sin.api.server:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SIN_DB_HOST: db
      SIN_DB_USER: ${POSTGRES_USER}
      SIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SIN_DB_NAME: ${POSTGRES_DB}
      SIN_REDIS_HOST: redis
      SIN_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SIN_API_KEY: ${SIN_API_KEY}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    restart: unless-stopped
    networks:
      - sin_internal

  worker:
    build: .
    container_name: sin_worker
    command: celery -A sin.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SIN_DB_HOST: db
      SIN_DB_USER: ${POSTGRES_USER}
      SIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SIN_DB_NAME: ${POSTGRES_DB}
      SIN_REDIS_HOST: redis
      SIN_REDIS_PASSWORD: ${REDIS_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SIN_SCAN_SUBNET: ${SIN_SCAN_SUBNET}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped
    networks:
      - sin_internal
      - sin_scan

  beat:
    build: .
    container_name: sin_beat
    command: celery -A sin.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      SIN_DB_HOST: db
      SIN_DB_USER: ${POSTGRES_USER}
      SIN_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SIN_DB_NAME: ${POSTGRES_DB}
      SIN_REDIS_HOST: redis
      SIN_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SIN_SCAN_SUBNET: ${SIN_SCAN_SUBNET}
    restart: unless-stopped
    networks:
      - sin_internal

  dashboard:
    image: nginx:alpine
    container_name: sin_dashboard
    ports:
      - "8501:80"
    volumes:
      - ./src/sin/ui/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sin_internal

volumes:
  postgres_data:

networks:
  sin_internal:
    driver: bridge
    internal: false
  sin_scan:
    driver: bridge
